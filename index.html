<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>习概逐题答题器</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --panel: #ffffff;
        --ink: #1f2528;
        --muted: #687178;
        --line: #d9ddd8;
        --soft: #eef7f4;
        --soft-amber: #fff6e8;
        --accent: #168a83;
        --accent-dark: #0f6762;
        --amber: #d97706;
        --good: #16803b;
        --bad: #c2410c;
        --shadow: 0 18px 40px rgba(31, 37, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(22, 138, 131, 0.07), rgba(255, 255, 255, 0) 280px),
          var(--bg);
        color: var(--ink);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Noto Sans CJK SC",
          system-ui,
          sans-serif;
        letter-spacing: 0;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1440px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto;
        gap: 16px;
        align-items: center;
        min-height: 58px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(22, 138, 131, 0.35);
        border-radius: 8px;
        background: var(--soft);
        color: var(--accent-dark);
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 3vw, 30px);
        line-height: 1.15;
        font-weight: 800;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .pill {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        white-space: nowrap;
      }

      .pill strong {
        color: var(--ink);
      }

      .layout {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr) 280px;
        gap: 16px;
        margin-top: 18px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .side {
        position: sticky;
        top: 16px;
        padding: 16px;
      }

      .group {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      select,
      input[type="search"] {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 0 10px;
        outline: none;
      }

      select:focus,
      input[type="search"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(22, 138, 131, 0.14);
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }

      .segmented button,
      .tool-button,
      .primary,
      .ghost {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 0 12px;
        transition:
          background 0.18s ease,
          border-color 0.18s ease,
          color 0.18s ease,
          transform 0.18s ease;
      }

      .segmented button.active {
        border-color: rgba(22, 138, 131, 0.55);
        background: var(--soft);
        color: var(--accent-dark);
        font-weight: 800;
      }

      .tool-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tool-button:hover,
      .ghost:hover,
      .segmented button:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
        font-weight: 800;
      }

      .primary:hover {
        background: var(--accent-dark);
      }

      .question-panel {
        padding: 20px;
        min-height: calc(100vh - 112px);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 16px;
      }

      .progress-shell {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: #e8ebe7;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), #e0a025);
        transition: width 0.24s ease;
      }

      .question-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: start;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 800;
      }

      .tag.alt {
        background: var(--soft-amber);
        color: #9a4f00;
      }

      .counter {
        color: var(--muted);
        font-weight: 800;
        white-space: nowrap;
      }

      .prompt {
        margin: 6px 0 0;
        font-size: clamp(20px, 2.2vw, 28px);
        line-height: 1.55;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .options {
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .option {
        width: 100%;
        min-height: 58px;
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 10px 12px;
        text-align: left;
      }

      .option:hover {
        border-color: var(--accent);
        background: #fbfefd;
      }

      .option.selected {
        border-color: var(--accent);
        background: var(--soft);
      }

      .option.correct {
        border-color: rgba(22, 128, 59, 0.55);
        background: #effaf2;
      }

      .option.wrong {
        border-color: rgba(194, 65, 12, 0.5);
        background: #fff2eb;
      }

      .option-key {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        border: 1px solid currentColor;
        color: var(--accent-dark);
        font-weight: 900;
      }

      .option-text {
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .feedback {
        min-height: 58px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfbfa;
        padding: 12px;
        display: none;
        line-height: 1.55;
      }

      .feedback.show {
        display: block;
      }

      .feedback.good {
        border-color: rgba(22, 128, 59, 0.35);
        background: #effaf2;
      }

      .feedback.bad {
        border-color: rgba(194, 65, 12, 0.35);
        background: #fff2eb;
      }

      .feedback strong.good {
        color: var(--good);
      }

      .feedback strong.bad {
        color: var(--bad);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1.2fr 1fr;
        gap: 10px;
      }

      .summary {
        position: sticky;
        top: 16px;
        padding: 16px;
        display: grid;
        gap: 14px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        min-height: 74px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfbfa;
      }

      .stat .num {
        display: block;
        font-size: 24px;
        line-height: 1;
        font-weight: 900;
      }

      .stat .name {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .nav-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        max-height: 380px;
        overflow: auto;
        padding-right: 2px;
      }

      .nav-dot {
        aspect-ratio: 1;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .nav-dot.current {
        border-color: var(--accent);
        background: var(--soft);
        color: var(--accent-dark);
      }

      .nav-dot.done {
        color: var(--good);
        border-color: rgba(22, 128, 59, 0.35);
      }

      .nav-dot.missed {
        color: var(--bad);
        border-color: rgba(194, 65, 12, 0.35);
        background: #fff7f2;
      }

      .empty {
        display: none;
        min-height: 320px;
        place-items: center;
        padding: 24px;
        color: var(--muted);
        text-align: center;
        line-height: 1.7;
      }

      .empty.show {
        display: grid;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1120px) {
        .layout {
          grid-template-columns: 280px minmax(0, 1fr);
        }

        .summary {
          grid-column: 1 / -1;
          position: static;
        }

        .nav-grid {
          grid-template-columns: repeat(10, minmax(34px, 1fr));
          max-height: 190px;
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 12px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .meta-row {
          justify-content: flex-start;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .side,
        .summary {
          position: static;
        }

        .question-panel {
          min-height: auto;
          padding: 16px;
        }

        .question-head {
          grid-template-columns: 1fr;
        }

        .counter {
          white-space: normal;
        }

        .actions {
          grid-template-columns: 1fr;
        }

        .tool-row {
          grid-template-columns: 1fr;
        }

        .nav-grid {
          grid-template-columns: repeat(6, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">习</div>
          <h1>习概逐题答题器</h1>
        </div>
        <div class="meta-row" aria-label="题库概览">
          <span class="pill">题库 <strong id="totalCount">0</strong></span>
          <span class="pill">当前 <strong id="activeCount">0</strong></span>
          <span class="pill">正确率 <strong id="rateTop">0%</strong></span>
        </div>
      </header>

      <section class="layout">
        <aside class="panel side">
          <div class="group">
            <label class="label" for="chapterSelect">章节</label>
            <select id="chapterSelect"></select>
          </div>

          <div class="group">
            <div class="label">题型</div>
            <div class="segmented" id="typeTabs">
              <button type="button" data-type="all" class="active">全部</button>
              <button type="button" data-type="single">单选</button>
              <button type="button" data-type="multiple">多选</button>
              <button type="button" data-type="judge">判断</button>
            </div>
          </div>

          <div class="group">
            <label class="label" for="modeSelect">范围</label>
            <select id="modeSelect">
              <option value="all">全部题目</option>
              <option value="wrong">错题</option>
              <option value="unanswered">未答</option>
            </select>
          </div>

          <div class="group">
            <label class="label" for="searchInput">搜索</label>
            <input id="searchInput" type="search" placeholder="题干或选项" />
          </div>

          <div class="tool-row">
            <button class="tool-button" type="button" id="shuffleBtn">打乱</button>
            <button class="tool-button" type="button" id="resetBtn">重置</button>
          </div>
        </aside>

        <section class="panel question-panel" aria-live="polite">
          <div class="progress-shell" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>

          <div id="questionView">
            <div class="question-head">
              <div>
                <div class="tags" id="questionTags"></div>
                <p class="prompt" id="prompt"></p>
              </div>
              <div class="counter" id="counter"></div>
            </div>
          </div>

          <div class="options" id="options"></div>

          <div class="feedback" id="feedback"></div>

          <div class="actions">
            <button class="ghost" type="button" id="prevBtn">上一题</button>
            <button class="primary" type="button" id="submitBtn">判题</button>
            <button class="ghost" type="button" id="nextBtn">下一题</button>
          </div>

          <div class="empty" id="emptyState">当前范围没有题目</div>
        </section>

        <aside class="panel summary">
          <div class="stat-grid">
            <div class="stat">
              <span class="num" id="answeredCount">0</span>
              <span class="name">已答</span>
            </div>
            <div class="stat">
              <span class="num" id="correctCount">0</span>
              <span class="name">正确</span>
            </div>
            <div class="stat">
              <span class="num" id="wrongCount">0</span>
              <span class="name">错题</span>
            </div>
            <div class="stat">
              <span class="num" id="rateCount">0%</span>
              <span class="name">正确率</span>
            </div>
          </div>
          <div class="group">
            <div class="label">题号</div>
            <div class="nav-grid" id="navGrid"></div>
          </div>
        </aside>
      </section>
    </main>

      "chapter": "第十七章 全面从严治党",
      "chapterOrder": 17,
      "number": 10,
      "type": "multiple",
      "options": [
        {
          "label": "A",
          "text": "伟大斗争"
        },
        {
          "label": "B",
          "text": "伟大工程"
        },
        {
          "label": "C",
          "text": "伟大事业"
        },
        {
          "label": "D",
          "text": "伟大梦想"
        }
      ],
      "answer": "ABCD",
      "prompt": "以习近平同志为核心的党中央统揽（ ），以刀刃向内的自我革命精神深入推进全面从严治党，推动中国特色社会主义事业展现出更为广阔的发展前景,党在革命性锻造中更加坚强有力。",
      "id": "q0270"
    }
  ]
};

</script>
    <script>
      const bank = window.QUESTION_BANK || { questions: [] };
      const allQuestions = bank.questions || [];
      const storageKey = "xigai-answerer-state-v1";
      const state = loadState();
      let activeType = "all";
      let visibleQuestions = [];
      let currentIndex = 0;
      let selected = new Set();
      let hasChecked = false;

      const chapterSelect = document.getElementById("chapterSelect");
      const modeSelect = document.getElementById("modeSelect");
      const searchInput = document.getElementById("searchInput");
      const typeTabs = document.getElementById("typeTabs");
      const totalCount = document.getElementById("totalCount");
      const activeCount = document.getElementById("activeCount");
      const rateTop = document.getElementById("rateTop");
      const progressBar = document.getElementById("progressBar");
      const questionTags = document.getElementById("questionTags");
      const prompt = document.getElementById("prompt");
      const counter = document.getElementById("counter");
      const options = document.getElementById("options");
      const feedback = document.getElementById("feedback");
      const emptyState = document.getElementById("emptyState");
      const questionView = document.getElementById("questionView");
      const prevBtn = document.getElementById("prevBtn");
      const submitBtn = document.getElementById("submitBtn");
      const nextBtn = document.getElementById("nextBtn");
      const shuffleBtn = document.getElementById("shuffleBtn");
      const resetBtn = document.getElementById("resetBtn");
      const navGrid = document.getElementById("navGrid");
      const answeredCount = document.getElementById("answeredCount");
      const correctCount = document.getElementById("correctCount");
      const wrongCount = document.getElementById("wrongCount");
      const rateCount = document.getElementById("rateCount");

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(storageKey)) || { answers: {}, order: [] };
        } catch {
          return { answers: {}, order: [] };
        }
      }

      function saveState() {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function typeName(type) {
        return {
          single: "单选",
          multiple: "多选",
          judge: "判断",
        }[type] || "题目";
      }

      function displayLabel(label) {
        if (label === "T") return "√";
        if (label === "F") return "×";
        return label;
      }

      function answerText(question, answer) {
        return answer
          .split("")
          .map((label) => {
            const option = question.options.find((item) => item.label === label);
            return `${displayLabel(label)}.${option ? option.text : ""}`;
          })
          .join("；");
      }

      function sortedAnswer(values) {
        return [...values].sort().join("");
      }

      function isCorrect(question, value) {
        return sortedAnswer(value.split("")) === sortedAnswer(question.answer.split(""));
      }

      function initChapters() {
        const chapters = [...new Map(allQuestions.map((q) => [q.chapter, q])).values()]
          .sort((a, b) => a.chapterOrder - b.chapterOrder || a.chapter.localeCompare(b.chapter, "zh-CN"));
        const total = allQuestions.length;
        chapterSelect.innerHTML = `<option value="all">全部章节（${total}）</option>`;
        for (const chapter of chapters) {
          const count = allQuestions.filter((q) => q.chapter === chapter.chapter).length;
          const option = document.createElement("option");
          option.value = chapter.chapter;
          option.textContent = `${chapter.chapter}（${count}）`;
          chapterSelect.appendChild(option);
        }
      }

      function applyFilters(keepCurrent = false) {
        const previousId = visibleQuestions[currentIndex]?.id;
        const chapter = chapterSelect.value;
        const mode = modeSelect.value;
        const keyword = searchInput.value.trim().toLowerCase();
        visibleQuestions = allQuestions.filter((question) => {
          const record = state.answers[question.id];
          const inChapter = chapter === "all" || question.chapter === chapter;
          const inType = activeType === "all" || question.type === activeType;
          const inMode =
            mode === "all" ||
            (mode === "wrong" && record?.checked && !record.correct) ||
            (mode === "unanswered" && !record?.checked);
          const content =
            `${question.prompt} ${question.options.map((option) => option.text).join(" ")}`.toLowerCase();
          return inChapter && inType && inMode && (!keyword || content.includes(keyword));
        });

        const orderMap = new Map((state.order || []).map((id, index) => [id, index]));
        visibleQuestions.sort((a, b) => {
          const orderA = orderMap.has(a.id) ? orderMap.get(a.id) : Number.MAX_SAFE_INTEGER;
          const orderB = orderMap.has(b.id) ? orderMap.get(b.id) : Number.MAX_SAFE_INTEGER;
          if (orderA !== orderB) return orderA - orderB;
          return allQuestions.indexOf(a) - allQuestions.indexOf(b);
        });

        if (keepCurrent && previousId) {
          currentIndex = Math.max(0, visibleQuestions.findIndex((question) => question.id === previousId));
        } else {
          currentIndex = Math.min(currentIndex, Math.max(visibleQuestions.length - 1, 0));
        }
        selected = new Set();
        hasChecked = false;
        render();
      }

      function shuffleVisible() {
        const ids = visibleQuestions.map((question) => question.id);
        for (let index = ids.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [ids[index], ids[swapIndex]] = [ids[swapIndex], ids[index]];
        }
        const others = allQuestions.map((question) => question.id).filter((id) => !ids.includes(id));
        state.order = [...ids, ...others];
        currentIndex = 0;
        saveState();
        applyFilters();
      }

      function resetProgress() {
        if (!confirm("清空当前答题记录？")) return;
        state.answers = {};
        state.order = [];
        saveState();
        selected = new Set();
        hasChecked = false;
        applyFilters();
      }

      function render() {
        totalCount.textContent = allQuestions.length;
        activeCount.textContent = visibleQuestions.length;
        renderStats();
        renderNavigator();

        const isEmpty = visibleQuestions.length === 0;
        emptyState.classList.toggle("show", isEmpty);
        questionView.classList.toggle("hidden", isEmpty);
        options.classList.toggle("hidden", isEmpty);
        feedback.classList.toggle("hidden", isEmpty);
        prevBtn.disabled = isEmpty;
        submitBtn.disabled = isEmpty;
        nextBtn.disabled = isEmpty;
        progressBar.style.width = isEmpty ? "0%" : `${((currentIndex + 1) / visibleQuestions.length) * 100}%`;
        if (isEmpty) return;

        const question = visibleQuestions[currentIndex];
        const record = state.answers[question.id];
        selected = new Set(record?.selected || []);
        hasChecked = Boolean(record?.checked);

        questionTags.innerHTML = "";
        const typeTag = document.createElement("span");
        typeTag.className = "tag";
        typeTag.textContent = typeName(question.type);
        const chapterTag = document.createElement("span");
        chapterTag.className = "tag alt";
        chapterTag.textContent = question.chapter;
        questionTags.append(typeTag, chapterTag);
        prompt.textContent = question.prompt;
        counter.textContent = `${currentIndex + 1} / ${visibleQuestions.length}`;

        options.innerHTML = "";
        for (const option of question.options) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "option";
          button.dataset.label = option.label;
          button.innerHTML = `
            <span class="option-key">${displayLabel(option.label)}</span>
            <span class="option-text"></span>
          `;
          button.querySelector(".option-text").textContent = option.text;
          button.addEventListener("click", () => chooseOption(option.label));
          options.appendChild(button);
        }

        feedback.className = "feedback";
        feedback.innerHTML = "";
        paintOptionState(question, record);
        submitBtn.textContent = hasChecked ? "再判一次" : "判题";
      }

      function chooseOption(label) {
        const question = visibleQuestions[currentIndex];
        if (question.type === "multiple") {
          selected.has(label) ? selected.delete(label) : selected.add(label);
        } else {
          selected = new Set([label]);
        }
        hasChecked = false;
        paintOptionState(question);
      }

      function paintOptionState(question, record = null) {
        const checked = record?.checked || hasChecked;
        const picked = record?.selected ? new Set(record.selected) : selected;
        for (const button of options.querySelectorAll(".option")) {
          const label = button.dataset.label;
          button.className = "option";
          if (picked.has(label)) button.classList.add("selected");
          if (checked && question.answer.includes(label)) button.classList.add("correct");
          if (checked && picked.has(label) && !question.answer.includes(label)) button.classList.add("wrong");
        }

        if (checked && record) {
          feedback.classList.add("show", record.correct ? "good" : "bad");
          feedback.innerHTML = record.correct
            ? `<strong class="good">答对了。</strong> 正确答案：${answerText(question, question.answer)}`
            : `<strong class="bad">答错了。</strong> 正确答案：${answerText(question, question.answer)}；你的答案：${record.selected.length ? answerText(question, record.selected.join("")) : "未选择"}`;
        }
      }

      function submitAnswer() {
        const question = visibleQuestions[currentIndex];
        if (!question) return;
        const value = sortedAnswer(selected);
        const correct = value ? isCorrect(question, value) : false;
        state.answers[question.id] = {
          selected: value.split(""),
          checked: true,
          correct,
          time: Date.now(),
        };
        saveState();
        hasChecked = true;
        render();
      }

      function move(delta) {
        if (!visibleQuestions.length) return;
        currentIndex = Math.min(Math.max(currentIndex + delta, 0), visibleQuestions.length - 1);
        selected = new Set();
        hasChecked = false;
        render();
      }

      function renderStats() {
        const records = Object.values(state.answers || {}).filter((record) => record.checked);
        const answered = records.length;
        const correct = records.filter((record) => record.correct).length;
        const wrong = records.filter((record) => !record.correct).length;
        const rate = answered ? `${Math.round((correct / answered) * 100)}%` : "0%";
        answeredCount.textContent = answered;
        correctCount.textContent = correct;
        wrongCount.textContent = wrong;
        rateCount.textContent = rate;
        rateTop.textContent = rate;
      }

      function renderNavigator() {
        navGrid.innerHTML = "";
        visibleQuestions.forEach((question, index) => {
          const button = document.createElement("button");
          const record = state.answers[question.id];
          button.type = "button";
          button.className = "nav-dot";
          button.textContent = index + 1;
          if (index === currentIndex) button.classList.add("current");
          if (record?.checked && record.correct) button.classList.add("done");
          if (record?.checked && !record.correct) button.classList.add("missed");
          button.addEventListener("click", () => {
            currentIndex = index;
            selected = new Set();
            hasChecked = false;
            render();
          });
          navGrid.appendChild(button);
        });
      }

      chapterSelect.addEventListener("change", () => applyFilters());
      modeSelect.addEventListener("change", () => applyFilters());
      searchInput.addEventListener("input", () => applyFilters(true));
      shuffleBtn.addEventListener("click", shuffleVisible);
      resetBtn.addEventListener("click", resetProgress);
      prevBtn.addEventListener("click", () => move(-1));
      nextBtn.addEventListener("click", () => move(1));
      submitBtn.addEventListener("click", submitAnswer);
      typeTabs.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-type]");
        if (!button) return;
        activeType = button.dataset.type;
        for (const tab of typeTabs.querySelectorAll("button")) {
          tab.classList.toggle("active", tab === button);
        }
        applyFilters();
      });

      initChapters();
      applyFilters();
    </script>
  </body>
</html>
